"Type: Feature":
  - head-branch: ['^feat', '-feature-']
"Type: Bug":
  - head-branch: ['^bug', '-bug-']
"Type: Maintenance":
  - head-branch: ['^maint', '^refact', '^chore', '-maintenance-']
"Type: Documentation":
  - head-branch: ['^docs', '-documentation-']
  - changed-files:
    - any-glob-to-any-file: ['docs/**']
"Type: Dependency":
  - head-branch: ['^dep', '-dependency-']
"Type: Security":
  - head-branch: ['^sec', '-security-']
"Component: CI/CD":
  - changed-files:
    - any-glob-to-any-file: ['.github/**']
"Component: Stack":
  - changed-files:
    - any-glob-to-any-file: ['stack/**']
"Component: Backend":
  - changed-files:
    - any-glob-to-any-file: ['ehrenamt-justiz-backend/**']
"Component: EAI":
  - changed-files:
    - any-glob-to-any-file: ['ehrenamt-justiz-eai/**']
"Component: Frontend":
  - changed-files:
    - any-glob-to-any-file: ['ehrenamt-justiz-frontend/**']
"Component: Online":
  - changed-files:
    - any-glob-to-any-file: ['ehrenamt-justiz-online/**']
"Component: Aenderungsservice":
  - changed-files:
    - any-glob-to-any-file: ['ehrenamt-justiz-aenderungsservice/**']